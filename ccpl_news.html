<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualités du Pays de Limours</title>
<style>
    :root {
        color-scheme: light;
    }
    body {
        font-family: Verdana, Geneva, sans-serif;
        background: #f6f6ef;
        color: #000;
        margin: 0;
        padding: 0;
    }
    header {
        background: #ff6600;
        padding: 10px 14px;
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
    }
    header h1 {
        font-size: 15px;
        margin: 0;
        color: #000;
    }
    header a.ccpl-link {
        font-size: 12px;
        color: #000;
    }
    main {
        max-width: 800px;
        margin: 0 auto;
        padding: 12px 14px;
    }
    ol.news-list {
        list-style: none;
        margin: 0;
        padding: 0;
        counter-reset: item;
    }
    ol.news-list li {
        counter-increment: item;
        padding: 6px 0;
        font-size: 13px;
        border-bottom: 1px solid #ebebeb;
    }
    ol.news-list li::before {
        content: counter(item) ". ";
        color: #828282;
        display: inline-block;
        width: 26px;
    }
    ol.news-list a.title {
        color: #000;
        text-decoration: none;
    }
    ol.news-list a.title:visited {
        color: #828282;
    }
    ol.news-list a.title:hover {
        text-decoration: underline;
    }
    .meta {
        color: #828282;
        font-size: 11px;
        margin-left: 26px;
    }
    footer {
        text-align: center;
        color: #828282;
        font-size: 11px;
        padding: 20px 14px;
    }
    .empty-state {
        color: #828282;
        font-size: 13px;
        padding: 20px 0;
    }
    .commune-filter {
        margin: 0 0 12px;
        font-size: 12px;
    }
    .commune-filter-toggle {
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 3px;
        padding: 4px 8px;
        font-size: 12px;
        font-family: inherit;
        color: #000;
        cursor: pointer;
    }
    .commune-filter-list {
        display: none;
        margin-top: 8px;
        padding: 8px 10px;
        background: #fff;
        border: 1px solid #ebebeb;
        border-radius: 4px;
    }
    .commune-filter-list.is-open {
        display: block;
    }
    .commune-filter-list label {
        display: block;
        padding: 2px 0;
        cursor: pointer;
    }
    .commune-filter-list input {
        margin-right: 6px;
    }
    @media (min-width: 1250px) {
        .commune-filter {
            position: fixed;
            left: max(12px, calc(50% - 610px));
            top: 90px;
            width: 190px;
        }
        .commune-filter-toggle {
            display: none;
        }
        .commune-filter-list {
            display: block !important;
            max-height: 70vh;
            overflow-y: auto;
        }
    }
</style>
</head>
<body>
<header>
    <h1>Actualités du Pays de Limours</h1>
    <a class="ccpl-link" href="https://www.cc-paysdelimours.fr/" target="_blank" rel="noopener">Site de la CCPL &rarr;</a>
</header>
<main>
    <aside class="commune-filter" id="commune-filter" hidden>
        <button type="button" class="commune-filter-toggle" id="commune-filter-toggle" aria-expanded="false">Filtrer les communes &#9662;</button>
        <div class="commune-filter-list" id="commune-filter-list"></div>
    </aside>
    <ol class="news-list" id="news-list"></ol>
    <p class="empty-state" id="empty-state" hidden>Aucune actualité pour le moment.</p>
</main>
<footer id="footer">Chargement...</footer>

<script>
function ccplTimeAgo(isoDate) {
    const then = new Date(isoDate).getTime();
    const now = Date.now();
    const diffSeconds = Math.max(0, Math.floor((now - then) / 1000));
    const diffDays = Math.floor(diffSeconds / 86400);
    if (diffDays === 0) return "aujourd'hui";
    if (diffDays === 1) return "il y a 1 jour";
    return `il y a ${diffDays} jours`;
}

function ccplFormatGeneratedAt(isoDate) {
    if (!isoDate) return "jamais encore mis à jour";
    const d = new Date(isoDate);
    return d.toLocaleString('fr-FR', { dateStyle: 'long', timeStyle: 'short' });
}

function ccplBuildCommuneFilter(communes) {
    const filterEl = document.getElementById('commune-filter');
    const toggleEl = document.getElementById('commune-filter-toggle');
    const listEl = document.getElementById('commune-filter-list');

    if (communes.length === 0) return;
    filterEl.hidden = false;

    const sorted = [...communes].sort((a, b) => a.localeCompare(b, 'fr'));
    for (const commune of sorted) {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = true;
        input.value = commune;
        label.appendChild(input);
        label.appendChild(document.createTextNode(commune));
        listEl.appendChild(label);
    }

    toggleEl.addEventListener('click', () => {
        const isOpen = listEl.classList.toggle('is-open');
        toggleEl.setAttribute('aria-expanded', String(isOpen));
    });

    listEl.addEventListener('change', ccplApplyCommuneFilter);
}

function ccplApplyCommuneFilter() {
    const listEl = document.getElementById('news-list');
    const emptyEl = document.getElementById('empty-state');
    const checked = new Set(
        [...document.querySelectorAll('#commune-filter-list input:checked')].map(input => input.value)
    );

    let visibleCount = 0;
    for (const li of listEl.children) {
        const show = checked.has(li.dataset.commune);
        li.hidden = !show;
        if (show) visibleCount++;
    }

    if (listEl.children.length > 0) {
        emptyEl.hidden = visibleCount > 0;
        emptyEl.textContent = "Aucune actualité pour les communes sélectionnées.";
    }
}

async function ccplLoadNews() {
    const listEl = document.getElementById('news-list');
    const emptyEl = document.getElementById('empty-state');
    const footerEl = document.getElementById('footer');

    try {
        const response = await fetch('data/ccpl_news.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const articles = Array.isArray(data.articles) ? data.articles : [];

        if (articles.length === 0) {
            emptyEl.hidden = false;
        } else {
            const communes = new Set();

            for (const article of articles) {
                if (!/^https?:\/\//i.test(article.url)) continue;

                const li = document.createElement('li');
                li.dataset.commune = article.commune;
                communes.add(article.commune);

                const link = document.createElement('a');
                link.className = 'title';
                link.href = article.url;
                link.target = '_blank';
                link.rel = 'noopener';
                link.textContent = article.title;
                li.appendChild(link);

                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `${article.commune} — ${ccplTimeAgo(article.published)}`;
                li.appendChild(meta);

                listEl.appendChild(li);
            }

            ccplBuildCommuneFilter([...communes]);
        }

        footerEl.textContent = `Mis à jour automatiquement chaque jour — dernière collecte : ${ccplFormatGeneratedAt(data.generated_at)}`;
    } catch (err) {
        footerEl.textContent = "Impossible de charger les actualités pour le moment.";
        emptyEl.hidden = false;
        emptyEl.textContent = "Erreur de chargement — réessayez plus tard.";
    }
}

ccplLoadNews();
</script>
</body>
</html>
